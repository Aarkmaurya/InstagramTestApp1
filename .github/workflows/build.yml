name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y python3-pip zip unzip openjdk-17-jdk git \
        libffi-dev libssl-dev build-essential python3-dev \
        libltdl-dev libtool autoconf automake
        # यहाँ Cython और Buildozer इंस्टॉल हो रहे हैं
        pip3 install --user cython==0.29.33 buildozer

    - name: Install Android SDK
    # यहाँ आपका पुराना SDK वाला फिक्स लगा हुआ है
      run: |
        mkdir -p $HOME/android-sdk/cmdline-tools
        cd $HOME/android-sdk/cmdline-tools
        wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-*.zip
        mv cmdline-tools latest
        
        export ANDROID_HOME=$HOME/android-sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
        yes | sdkmanager --licenses --sdk_root=$ANDROID_HOME
        sdkmanager --sdk_root=$ANDROID_HOME "platform-tools" "platforms;android-33" "build-tools;33.0.0"

    - name: Build APK with Buildozer
      run: |
        # यहाँ हमने Python टूल्स का रास्ता (Path) सेट किया है
        export PATH=$PATH:$HOME/.local/bin
        export ANDROID_HOME=$HOME/android-sdk
        
        if [ ! -f buildozer.spec ]; then buildozer init; fi
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        path: bin/*.apk
