name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Build Tools
      run: |
        sudo apt update
        sudo apt install -y python3-pip zip unzip git build-essential \
        libffi-dev libssl-dev python3-dev libltdl-dev libtool autoconf automake
        pip3 install --user cython==0.29.33 buildozer
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Pre-Accept All Licenses
      run: |
        # यहाँ हम Buildozer के फोल्डर के अंदर जाकर पहले ही सब "y" कर रहे हैं
        mkdir -p $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin
        yes | sdkmanager --licenses --sdk_root=$ANDROID_HOME || true

    - name: Final Build
      run: |
        if [ ! -f buildozer.spec ]; then buildozer init; fi
        
        # ऑटो-लाइसेंस को Spec फाइल में पक्का करना
        sed -i 's|^#android.accept_sdk_license =.*|android.accept_sdk_license = True|' buildozer.spec
        
        # बिना किसी सवाल के बिल्ड शुरू करें
        export APP_ANDROID_ACCEPT_SDK_LICENSE=1
        buildozer -v android debug
