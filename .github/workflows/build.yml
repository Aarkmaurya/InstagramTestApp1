name: Build APK V3 (Fresh & Fast)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04 # Stable version
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev \
          libxml2-dev libxslt1-dev gettext m4 python3-pip python3-setuptools \
          libsqlite3-dev sqlite3 # Database aur SQLite support ke liye zaroori

      - name: Install Python Build Tools
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install "cython<3.0" "buildozer==1.5.0" "sh"

      - name: Build with Buildozer
        run: |
          # Purani cache aur environment clear karna
          rm -rf .buildozer
          rm -rf ~/.buildozer
          
          # Android SDK licenses auto-accept karna
          export APP_ANDROID_ACCEPT_SDK_LICENSE=1
          
          # Build process start (Verbose mode)
          buildozer -v android debug
        env:
          ACCEPT_SDK_LICENSE: "y"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Insta-Test-V3-APK
          path: bin/*.apk
