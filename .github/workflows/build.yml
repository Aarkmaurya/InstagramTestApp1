name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev \
          libxml2-dev libxslt1-dev gettext m4 python3-pip
      - name: Install Python Tools
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install "cython<3.0" "buildozer==1.5.0"
      - name: Build APK
        run: |
          rm -rf .buildozer
          unset ANDROID_HOME
          export APP_ANDROID_ACCEPT_SDK_LICENSE=1
          buildozer -v android debug
