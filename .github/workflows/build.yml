name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev \
          libxml2-dev libxslt1-dev gettext m4
          
      - name: Install Python & Buildozer
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install "cython<3.0" "buildozer<1.6.0"
          
      - name: Build APK
        run: |
          rm -rf .buildozer
          # GitHub variables ko clear karein taaki toolchain confuse na ho
          unset ANDROID_SDK_ROOT
          unset ANDROID_NDK_ROOT
          unset ANDROID_HOME
          
          export APP_ANDROID_ACCEPT_SDK_LICENSE=1
          # Pehle clean build ensure karein
          buildozer android clean
          buildozer -v android debug
        env:
          ACCEPT_SDK_LICENSE: "y"
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Instagram-Test-APK
          path: bin/*.apk
