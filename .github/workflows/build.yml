name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk \
          python3-pip autoconf libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev cmake libffi-dev \
          libssl-dev wget
          
      - name: Install Python Packages
        run: |
          pip install --upgrade pip
          pip install cython buildozer
          
      - name: Clean Previous Build
        run: |
          rm -rf .buildozer
          rm -rf bin
          
      - name: Accept Android Licenses
        run: |
          mkdir -p ~/.android
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a1481e" > ~/.android/licenses/android-sdk-license
          echo -e "84831b9409646a918e30573bab4c9c91346d8abd\n504667f4c0de7af1a06de9f4b1727b84391f2910" > ~/.android/licenses/android-sdk-preview-license
          
      - name: Build APK
        run: |
          yes | buildozer android debug
        env:
          ACCEPT_SDK_LICENSE: "y"
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Instagram-Test-APK
          path: bin/*.apk
