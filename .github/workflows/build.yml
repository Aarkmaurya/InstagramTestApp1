name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y python3-pip zip unzip git build-essential \
        libffi-dev libssl-dev python3-dev libltdl-dev libtool autoconf automake \
        libncurses5 libstdc++6
        pip3 install --user cython==0.29.33 buildozer
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Build with Fixed Paths
      run: |
        if [ ! -f buildozer.spec ]; then buildozer init; fi
        
        # Buildozer को GitHub के SDK का रास्ता बताना (ताकि लाइसेंस एरर न आए)
        sed -i "s|^#android.sdk_path =.*|android.sdk_path = $ANDROID_HOME|" buildozer.spec
        sed -i "s|^#android.ndk_path =.*|android.ndk_path = $ANDROID_NDK_LATEST_HOME|" buildozer.spec
        sed -i 's|^#android.accept_sdk_license =.*|android.accept_sdk_license = True|' buildozer.spec
        
        # लाइसेंस स्वीकार करना
        yes | sdkmanager --licenses --sdk_root=$ANDROID_HOME
        
        # फाइनल बिल्ड कमांड
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        path: bin/*.apk
