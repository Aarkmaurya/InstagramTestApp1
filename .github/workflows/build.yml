name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        path: bin/*.apk
name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y python3-pip zip unzip git build-essential \
        libffi-dev libssl-dev python3-dev libltdl-dev libtool autoconf automake
        pip3 install --user cython==0.29.33 buildozer
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Final Build Attempt
      run: |
        if [ ! -f buildozer.spec ]; then buildozer init; fi
        
        # ऑटो-एक्सेप्ट सेटिंग्स को स्पेसिफिकेशन फाइल में डालना
        sed -i 's|^#android.accept_sdk_license =.*|android.accept_sdk_license = True|' buildozer.spec
        
        # एनवायरनमेंट वेरिएबल्स को एक्सपोर्ट करना जो बिल्डोजर को 'No' कहने से रोकेंगे
        export APP_ANDROID_ACCEPT_SDK_LICENSE=1
        export GRADLE_OPTS="-Dorg.gradle.daemon=false"
        
        # बिल्ड कमांड - इस बार 'yes' के साथ थोड़ा अलग तरीके से
        yes y | buildozer -v android debug
