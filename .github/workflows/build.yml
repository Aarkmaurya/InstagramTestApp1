name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          sudo apt-get update
          # libtinfo5 ko libtinfo6 se replace kiya gaya hai Ubuntu 24.04 ke liye
          sudo apt-get install -y \
            git \
            zip \
            unzip \
            autoconf \
            automake \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo6 \
            cmake \
            libffi-dev \
            libssl-dev
          
          python3 -m pip install --upgrade pip
          # Cython ka specific version build errors rokne ke liye
          python3 -m pip install --upgrade buildozer "cython<3.0" 
          python3 -m pip install git+https://github.com/kivy/python-for-android.git

      - name: Build with Buildozer
        run: |
          # Pehle purani failed build files clean karein
          buildozer android clean
          # Auto-accept licenses aur verbose mode check karne ke liye
          yes | buildozer -v android debug
        env:
          ACCEPT_SDK_LICENSE: "y"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
