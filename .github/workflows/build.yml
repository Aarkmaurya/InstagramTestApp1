    - name: Configure and Build
      run: |
        # 1. अगर spec फाइल नहीं है, तो बनाओ
        if [ ! -f buildozer.spec ]; then buildozer init; fi
        
        # 2. Spec फाइल को अपडेट करें ताकि वह हमारे वाले SDK का रास्ता देखे
        # ध्यान दें: हमने पहले स्टेप में SDK 33.0.0 इंस्टॉल की है, तो यहाँ भी वही सेट करेंगे
        sed -i 's|^#android.sdk_path =.*|android.sdk_path = /home/runner/android-sdk|' buildozer.spec
        sed -i 's|^#android.accept_sdk_license =.*|android.accept_sdk_license = True|' buildozer.spec
        sed -i 's|^android.api =.*|android.api = 33|' buildozer.spec
        sed -i 's|^#android.build_tools_ver =.*|android.build_tools_ver = 33.0.0|' buildozer.spec
        
        # 3. बिल्ड शुरू करें (बिना दोबारा पूछे)
        export APP_ANDROID_ACCEPT_SDK_LICENSE=1
        buildozer -v android debug

