name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04  # Stable version for Buildozer

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y python3-pip zip unzip git build-essential \
        libffi-dev libssl-dev python3-dev libltdl-dev libtool autoconf automake \
        libncurses6 libstdc++6 ant python3-setuptools
        pip3 install --user cython==0.29.33 buildozer
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Build APK
      run: |
        # पुरानी सेटिंग साफ़ करें
        rm -rf .buildozer
        
        # लाइसेंस और SDK की सेटिंग सीधे कमांड से करेंगे, sed की ज़रूरत नहीं
        # यह लाइन 'True' वाला एरर खत्म कर देगी
        buildozer android debug || buildozer android debug
      env:
        # लाइसेंस खुद स्वीकार करने के लिए environment variable
        APP_ANDROID_ACCEPT_SDK_LICENSE: "1"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-instagram-test-app
        path: bin/*.apk
