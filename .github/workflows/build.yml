name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04  # 👈 Maine version change kiya hai, 22.04 zyada stable hai Buildozer ke liye
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev \
          libxml2-dev libxslt1-dev gettext m4 python3-pip python3-setuptools

      - name: Install Python Tools
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install "cython<3.0" "buildozer==1.5.0" "sh"

      - name: Build APK
        run: |
          # Sab kuch fresh start
          rm -rf .buildozer
          
          # Force clear GitHub paths (Inki wajah se hi error aa raha tha)
          export ANDROID_HOME=""
          export ANDROID_SDK_ROOT=""
          export ANDROID_NDK_ROOT=""
          
          # License automatically accept karein
          export APP_ANDROID_ACCEPT_SDK_LICENSE=1
          
          # Build shuru
          buildozer -v android debug
        env:
          ACCEPT_SDK_LICENSE: "y"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Instagram-Test-APK
          path: bin/*.apk
